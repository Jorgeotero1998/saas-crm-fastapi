services:
  - type: web
    name: backend-portfolio-template-api
    env: docker
    plan: free
    autoDeploy: true
    dockerfilePath: docker/api/Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: backend-portfolio-template-db
          property: connectionString
      - key: LLM_ENABLED
        value: "false"

databases:
  - name: backend-portfolio-template-db
    plan: free
    databaseName: app
