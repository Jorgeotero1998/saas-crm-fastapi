services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.workers.celery_app", "worker", "-l", "INFO"]
    depends_on:
      - redis
      - db

  beat:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.workers.celery_app", "beat", "-l", "INFO"]
    depends_on:
      - redis
      - db

volumes:
  postgres_data:

